<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ooyake 公 — world government atlas map</title>
<!--
  Self-contained world-government map for the ooyake atlas (ADR-2606021600).
  Renders wire/viz/gov-atlas.geojson on a pure-canvas equirectangular projection — NO
  external tiles, NO CDN, NO trackers (Charter ad-free / no-third-party compliant).
  Observational mirror (G3/G11): a descriptive civic map, never an official channel,
  never ranked. Pan = drag, zoom = wheel, click a point = details.
-->
<style>
  :root { --bg:#0b0f14; --panel:#121925; --ink:#e6edf3; --muted:#8b98a5; }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:13px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
  #wrap{position:fixed;inset:0}
  canvas{display:block;cursor:grab}
  canvas.drag{cursor:grabbing}
  #hud{position:fixed;top:10px;left:10px;background:rgba(18,25,37,.92);
    border:1px solid #233044;border-radius:10px;padding:10px 12px;max-width:280px}
  #hud h1{font-size:14px;margin:0 0 4px}
  #hud p{margin:2px 0;color:var(--muted)}
  #legend{margin-top:8px;display:grid;gap:3px}
  #legend label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--ink)}
  .sw{width:11px;height:11px;border-radius:50%;display:inline-block;flex:0 0 auto}
  #pop{position:fixed;background:rgba(18,25,37,.97);border:1px solid #2b3b52;
    border-radius:8px;padding:8px 10px;max-width:280px;display:none;pointer-events:auto}
  #pop b{color:#fff}
  #pop a{color:#6cb6ff}
  #pop .x{float:right;cursor:pointer;color:var(--muted);margin-left:8px}
  #count{color:var(--muted)}
  .credit{position:fixed;bottom:6px;right:8px;color:#56636f;font-size:11px}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud">
  <h1>ooyake 公 — government atlas</h1>
  <p id="count">loading…</p>
  <div id="legend"></div>
  <p style="margin-top:8px">drag = pan · wheel = zoom · click a dot = details</p>
</div>
<div id="pop"></div>
<div class="credit">observational mirror · descriptive, never a target-list (G3/G11)</div>
<script>
const BRANCH = {
  ":executive":      ["#4f9dff","executive (ministries)"],
  ":local":          ["#5fd08a","subnational (states/provinces)"],
  ":independent":    ["#f2c14e","independent (central banks, oversight, regulators)"],
  ":legislative":    ["#c792ea","legislature"],
  ":judicial":       ["#ff8a65","judiciary (supreme courts)"],
  ":intergovernmental":["#e6edf3","intergovernmental (IGOs)"],
};
const c = document.getElementById('c'), ctx = c.getContext('2d');
let W,H, feats=[], view={scale:1, x:0, y:0}, off=new Set();
function resize(){ W=c.width=innerWidth*devicePixelRatio; H=c.height=innerHeight*devicePixelRatio;
  c.style.width=innerWidth+'px'; c.style.height=innerHeight+'px'; draw(); }
addEventListener('resize', resize);
// base equirectangular: lon[-180,180]->[0,W], lat[90,-90]->[0,H], then view transform
function proj(lon,lat){
  const bx=(lon+180)/360*W, by=(90-lat)/180*H;
  return [bx*view.scale+view.x, by*view.scale+view.y];
}
function draw(){
  ctx.fillStyle='#0b0f14'; ctx.fillRect(0,0,W,H);
  // graticule
  ctx.strokeStyle='rgba(120,140,160,.12)'; ctx.lineWidth=1;
  for(let lon=-180;lon<=180;lon+=30){ const a=proj(lon,90),b=proj(lon,-90);
    ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke(); }
  for(let lat=-60;lat<=90;lat+=30){ const a=proj(-180,lat),b=proj(180,lat);
    ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke(); }
  const r=Math.max(1.1, 1.6*Math.min(2.5,view.scale))*devicePixelRatio;
  for(const f of feats){
    const br=f.properties.branch; if(off.has(br)) continue;
    const co=f.geometry.coordinates, p=proj(co[0],co[1]);
    if(p[0]<-20||p[0]>W+20||p[1]<-20||p[1]>H+20) continue;
    ctx.beginPath(); ctx.arc(p[0],p[1],r,0,7);
    ctx.fillStyle=(BRANCH[br]||["#9aa"])[0]; ctx.globalAlpha=.82; ctx.fill();
  }
  ctx.globalAlpha=1;
}
function legend(){
  const counts={}; for(const f of feats){const b=f.properties.branch; counts[b]=(counts[b]||0)+1;}
  const el=document.getElementById('legend'); el.innerHTML='';
  for(const k in BRANCH){ const [col,lab]=BRANCH[k];
    const id='b'+k.replace(/\W/g,'');
    const w=document.createElement('label');
    w.innerHTML=`<input type=checkbox checked id=${id}><span class=sw style="background:${col}"></span>${lab} <span style="color:#56636f">(${counts[k]||0})</span>`;
    w.querySelector('input').onchange=e=>{ if(e.target.checked) off.delete(k); else off.add(k); draw(); };
    el.appendChild(w);
  }
}
// interaction
let drag=null;
c.addEventListener('mousedown',e=>{drag=[e.clientX,e.clientY,view.x,view.y];c.classList.add('drag');});
addEventListener('mouseup',()=>{drag=null;c.classList.remove('drag');});
addEventListener('mousemove',e=>{ if(!drag)return;
  view.x=drag[2]+(e.clientX-drag[0])*devicePixelRatio; view.y=drag[3]+(e.clientY-drag[1])*devicePixelRatio; draw();});
c.addEventListener('wheel',e=>{e.preventDefault();
  const f=e.deltaY<0?1.15:1/1.15, mx=e.clientX*devicePixelRatio, my=e.clientY*devicePixelRatio;
  view.x=mx-(mx-view.x)*f; view.y=my-(my-view.y)*f; view.scale*=f; draw();},{passive:false});
c.addEventListener('click',e=>{
  const mx=e.clientX*devicePixelRatio, my=e.clientY*devicePixelRatio; let best=null,bd=14*14*devicePixelRatio*devicePixelRatio;
  for(const f of feats){ const br=f.properties.branch; if(off.has(br))continue;
    const co=f.geometry.coordinates,p=proj(co[0],co[1]); const d=(p[0]-mx)**2+(p[1]-my)**2;
    if(d<bd){bd=d;best=f;} }
  const pop=document.getElementById('pop');
  if(!best){pop.style.display='none';return;}
  const pr=best.properties, wd=pr.wikidata?`<a href="https://www.wikidata.org/wiki/${pr.wikidata}" target="_blank" rel="noopener">${pr.wikidata}</a>`:'—';
  const url=pr.official_url?`<a href="${pr.official_url}" target="_blank" rel="noopener">official site ↗</a><br>`:'';
  pop.innerHTML=`<span class=x onclick="this.parentNode.style.display='none'">✕</span>`+
    `<b>${pr.name||pr.id}</b><br><span style="color:#8b98a5">${(pr.level||'').slice(1)} · ${(pr.branch||'').slice(1)} · ${(pr.jurisdiction||'').toUpperCase()}</span><br>`+
    (pr.city?`📍 ${pr.city}<br>`:'')+url+`Wikidata ${wd}`;
  pop.style.left=Math.min(e.clientX+12,innerWidth-300)+'px'; pop.style.top=(e.clientY+12)+'px'; pop.style.display='block';
});
fetch('./gov-atlas.geojson').then(r=>r.json()).then(d=>{
  feats=d.features; document.getElementById('count').textContent=feats.length.toLocaleString()+' geolocated government bodies · '+
    (new Set(feats.map(f=>f.properties.jurisdiction))).size+' jurisdictions';
  legend(); resize();
}).catch(e=>{document.getElementById('count').textContent='could not load gov-atlas.geojson ('+e+')';});
</script>
</body>
</html>
